name: benchmark-flywheel

# Queue overlapping runs (cron + workflow_dispatch) so they don't race the
# rolling tournament-predictions / benchmark-data artifacts. cancel-in-progress
# is false because each run produces real data we want to keep.
concurrency:
  group: benchmark-flywheel
  cancel-in-progress: false

on:
  schedule:
    - cron: '30 2 * * *'  # daily at 02:30 UTC (aims for Slack post before 11:00 IST)
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Number of days to look back for data'
        required: false
        default: '7'
      max_markets:
        description: 'Max markets per platform for tournament'
        required: false
        default: '10'
      tools:
        description: 'Comma-separated subset of tools (default: every key in benchmark/tournament_tools.json)'
        required: false
        default: ''
      notify_slack:
        description: 'Post summary to Slack'
        required: false
        type: boolean
        default: true
      force_rebuild:
        description: 'Discard cached scores and rebuild from fresh production logs'
        required: false
        type: boolean
        default: false
      rolling_window_days:
        description: 'Trailing-window length (days) for the Current/Prev rolling comparison sections'
        required: false
        default: '7'

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Production benchmark
  # Depends on tournament-run so tournament_scored.jsonl is available for
  # the scorer/analyze steps to merge into the unified report.
  # -----------------------------------------------------------------------
  benchmark:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    needs: [tournament-run]
    if: always() && !cancelled()
    # Drives both the Python ROLLING_WINDOW_DAYS constant (read at import
    # time in benchmark/analyze.py) and the --period-days flag passed to
    # the scorer below, keeping the report and the scoring step in sync.
    env:
      BENCHMARK_ROLLING_WINDOW_DAYS: ${{ github.event.inputs.rolling_window_days || '7' }}

    steps:
      # fetch-depth: 0 so `git show <tag>:packages/packages.json` works for
      # every historical release — required by benchmark/release_map.py.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests scipy numpy

      # Download previous run's state + scores (if they exist)
      - name: Download previous benchmark data
        uses: dawidd6/action-download-artifact@09f2f74827fd3a8607589e5ad7f9398816f540fe  # v3
        with:
          name: benchmark-data
          path: benchmark/
          workflow: benchmark_flywheel.yaml
          if_no_artifact_found: warn
        continue-on-error: true

      # Tournament-scored data from the tournament-run job. Used as input
      # to scorer (--tournament-input) so the per-(tool, version, mode)
      # breakdown shows up in the unified report.
      - name: Download tournament scored data
        uses: actions/download-artifact@v4
        with:
          name: tournament-predictions
          path: benchmark/results/
        continue-on-error: true

      # force_rebuild semantics: wipe ALL derived scoring state as a set
      # (scores.json, scores_history.jsonl, scored_row_ids.json) AND the
      # fetch cursor (.fetch_state.json) so the subsequent fetch pulls
      # the full lookback window and the Score step rebuilds from raw
      # logs without stale dedup or cursor state poisoning the result.
      # Before the include-hidden-files fix .fetch_state.json was never
      # persisted so deleting it here was a no-op; now that it rides in
      # the artifact, force_rebuild must explicitly clear it or the
      # rebuild runs against an empty log dir.
      - name: Clear cached scores (force rebuild)
        if: github.event.inputs.force_rebuild == 'true'
        run: |
          rm -f benchmark/results/scores.json \
                benchmark/results/scores_history.jsonl \
                benchmark/results/scored_row_ids.json \
                benchmark/datasets/.fetch_state.json

      # Fetch writes daily log file + calls scorer.update() inline (fast path).
      # On force_rebuild, --no-score disables the inline scoring so the
      # dedicated Score step below owns scores.json creation (slow path).
      # Inputs routed through env (not ${{ }} interpolation in the shell script)
      # to prevent workflow_dispatch shell injection — ${{ }} is macro-expanded
      # before the shell runs, so malicious input would become part of the script.
      - name: Fetch production data
        env:
          INPUT_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
        run: |
          NO_SCORE_FLAG=""
          if [ "$FORCE_REBUILD" = "true" ]; then
            NO_SCORE_FLAG="--no-score"
          fi
          python -m benchmark.datasets.fetch_production \
            --lookback-days "$INPUT_LOOKBACK_DAYS" \
            $NO_SCORE_FLAG

      # Slow-path scoring: run --rebuild when either (a) scores.json is
      # missing (first run, or prior run crashed before fetch's inline
      # update), or (b) force_rebuild=true (explicit full rebuild). On
      # normal runs the fast path in fetch_production already produced
      # scores.json, and this step is a no-op.
      - name: Score
        env:
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
        run: |
          TOURNAMENT_FLAG=""
          if [ -f benchmark/results/tournament_scored.jsonl ]; then
            TOURNAMENT_FLAG="--tournament-input benchmark/results/tournament_scored.jsonl"
          fi
          if [ ! -f benchmark/results/scores.json ] || [ "$FORCE_REBUILD" = "true" ]; then
            echo "Running full rebuild (missing scores.json or force_rebuild=true)"
            python -m benchmark.scorer --rebuild \
              --logs-dir benchmark/datasets/logs/ \
              $TOURNAMENT_FLAG
          else
            echo "scores.json present and not force_rebuild — fast path already ran in fetch"
          fi

      # Incrementally merge tournament-scored rows into the cumulative
      # scores.json. Dedup by row_id (via scored_row_ids.json) makes this
      # a no-op on force_rebuild (rebuild already included --tournament-input
      # and wrote the full row_id set), and adds only genuinely new rows
      # on normal runs.
      - name: Merge tournament into cumulative scores
        if: hashFiles('benchmark/results/tournament_scored.jsonl') != ''
        run: |
          python -m benchmark.scorer \
            --update benchmark/results/tournament_scored.jsonl
        continue-on-error: true

      # Score recent periods for diff reporting. The window length
      # (--period-days, --period-offset-days) is driven by the
      # BENCHMARK_ROLLING_WINDOW_DAYS env var declared at the job level
      # so the scorer and the Python ROLLING_WINDOW_DAYS constant stay in
      # sync from a single source.
      - name: Score current rolling window
        run: |
          TOURNAMENT_FLAG=""
          if [ -f benchmark/results/tournament_scored.jsonl ]; then
            TOURNAMENT_FLAG="--tournament-input benchmark/results/tournament_scored.jsonl"
          fi
          python -m benchmark.scorer \
            --period-days "$BENCHMARK_ROLLING_WINDOW_DAYS" \
            --logs-dir benchmark/datasets/logs/ \
            --output benchmark/results/rolling_scores.json \
            $TOURNAMENT_FLAG
        continue-on-error: true

      # Score the preceding non-overlapping window (offset by the same
      # window length so Current and Prev never overlap). Feeds the
      # "Δ vs Prev Nd" columns in the three-window comparison tables.
      - name: Score previous rolling window (non-overlapping)
        run: |
          TOURNAMENT_FLAG=""
          if [ -f benchmark/results/tournament_scored.jsonl ]; then
            TOURNAMENT_FLAG="--tournament-input benchmark/results/tournament_scored.jsonl"
          fi
          python -m benchmark.scorer \
            --period-days "$BENCHMARK_ROLLING_WINDOW_DAYS" \
            --period-offset-days "$BENCHMARK_ROLLING_WINDOW_DAYS" \
            --logs-dir benchmark/datasets/logs/ \
            --output benchmark/results/prev_rolling_scores.json \
            $TOURNAMENT_FLAG
        continue-on-error: true

      - name: Analyze (Omenstrat)
        run: python -m benchmark.analyze --platform omen --include-tournament

      - name: Analyze (Polystrat)
        if: always() && !cancelled()
        run: python -m benchmark.analyze --platform polymarket --include-tournament

      # Upload state + scores (small, needed for next run).
      # include-hidden-files: true is required so .fetch_state.json
      # (leading dot = hidden under v4's default filter) actually ships
      # in the artifact. Without it, the incremental fetch cursor is
      # silently dropped every run and the scorer compounds double-counts.
      # Per-platform scores files each carry their own incremental-resume
      # state; dropping any of them resets that platform's accumulator.
      - name: Upload benchmark data
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-data
          include-hidden-files: true
          path: |
            benchmark/datasets/.fetch_state.json
            benchmark/datasets/logs/
            benchmark/results/scores.json
            benchmark/results/scores_omen.json
            benchmark/results/scores_polymarket.json
            benchmark/results/scores_tournament.json
            benchmark/results/scores_tournament_omen.json
            benchmark/results/scores_tournament_polymarket.json
            benchmark/results/scores_history.jsonl
            benchmark/results/scored_row_ids.json
            benchmark/results/report_omen.md
            benchmark/results/report_polymarket.md
          retention-days: 90

      - name: Resolve report artifact URL
        id: artifact-url
        run: |
          AID=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name=="benchmark-data") | .id' 2>/dev/null || true)
          if [ -n "$AID" ]; then
            echo "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/$AID" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # The hashFiles() guard keeps the per-platform Slack post independent
      # of the other platform's Analyze step: if report_<platform>.md was
      # not written (because Analyze crashed before writing it), we skip
      # the Slack post for that platform rather than firing notify_slack
      # against a missing file. The neighboring platform's Slack post
      # still runs, since each step gates on its own report file.
      - name: Post Omenstrat summary to Slack
        if: always() && !cancelled() && (github.event.inputs.notify_slack != 'false') && (vars.ENABLE_SLACK_NOTIFY != 'false') && hashFiles('benchmark/results/report_omen.md') != ''
        env:
          OPENAI_API_KEY: ${{ secrets.BENCHMARK_OPENAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.BENCHMARK_SLACK_WEBHOOK_URL }}
          REPORT_ARTIFACT_URL: ${{ steps.artifact-url.outputs.url }}
        run: |
          python -m benchmark.notify_slack \
            --report benchmark/results/report_omen.md \
            --platform-label Omenstrat

      - name: Post Polystrat summary to Slack
        if: always() && !cancelled() && (github.event.inputs.notify_slack != 'false') && (vars.ENABLE_SLACK_NOTIFY != 'false') && hashFiles('benchmark/results/report_polymarket.md') != ''
        env:
          OPENAI_API_KEY: ${{ secrets.BENCHMARK_OPENAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.BENCHMARK_SLACK_WEBHOOK_URL }}
          REPORT_ARTIFACT_URL: ${{ steps.artifact-url.outputs.url }}
        run: |
          python -m benchmark.notify_slack \
            --report benchmark/results/report_polymarket.md \
            --platform-label Polystrat

      # Daily log files uploaded separately for archival
      - name: Upload daily log archive
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-log-${{ github.run_id }}
          path: benchmark/datasets/logs/
          retention-days: 90

  # -----------------------------------------------------------------------
  # Job 2: Fetch open markets for tournament (fast, no API keys)
  # -----------------------------------------------------------------------
  tournament-fetch:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Download previous open markets
        uses: dawidd6/action-download-artifact@09f2f74827fd3a8607589e5ad7f9398816f540fe  # v3
        with:
          name: tournament-markets
          path: benchmark/datasets/
          workflow: benchmark_flywheel.yaml
          if_no_artifact_found: warn
        continue-on-error: true

      # Inputs routed via env to avoid shell injection — see note in benchmark job.
      - name: Fetch Omen open markets
        env:
          INPUT_MAX_MARKETS: ${{ github.event.inputs.max_markets || '10' }}
        run: |
          python -m benchmark.datasets.fetch_open \
            --platform omen \
            --max-markets "$INPUT_MAX_MARKETS"

      - name: Fetch Polymarket open markets
        env:
          INPUT_MAX_MARKETS: ${{ github.event.inputs.max_markets || '10' }}
        run: |
          python -m benchmark.datasets.fetch_open \
            --platform polymarket \
            --max-markets "$INPUT_MAX_MARKETS" \
            --min-liquidity 1000

      - name: Upload tournament markets
        uses: actions/upload-artifact@v4
        with:
          name: tournament-markets
          path: benchmark/datasets/open_markets.jsonl
          retention-days: 90

  # -----------------------------------------------------------------------
  # Job 3a: Check if benchmark API keys are configured
  # -----------------------------------------------------------------------
  check-secrets:
    runs-on: ubuntu-22.04
    outputs:
      has_keys: ${{ steps.check.outputs.has_keys }}
    steps:
      - id: check
        env:
          KEY: ${{ secrets.BENCHMARK_OPENAI_API_KEY }}
        run: echo "has_keys=${{ env.KEY != '' }}" >> $GITHUB_OUTPUT

  # -----------------------------------------------------------------------
  # Job 3b: Run tournament predictions + score (slow, needs API keys)
  # -----------------------------------------------------------------------
  tournament-run:
    needs: [tournament-fetch, check-secrets]
    if: needs.check-secrets.outputs.has_keys == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: astral-sh/setup-uv@v4

      - name: Install project dependencies
        run: uv sync

      # Cache IPFS-fetched tool sources between runs. Key on
      # tournament_tools.json so a CID bump triggers a fresh fetch but
      # unchanged runs reuse cached bytes.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/mech-predict/tournament-tools
          key: ipfs-tools-${{ hashFiles('benchmark/tournament_tools.json') }}

      - name: Download tournament markets
        uses: actions/download-artifact@v4
        with:
          name: tournament-markets
          path: benchmark/datasets/

      - name: Download previous tournament predictions
        uses: dawidd6/action-download-artifact@09f2f74827fd3a8607589e5ad7f9398816f540fe  # v3
        with:
          name: tournament-predictions
          path: benchmark/results/
          workflow: benchmark_flywheel.yaml
          if_no_artifact_found: warn
        continue-on-error: true

      # Inputs routed via env to avoid shell injection — see note in benchmark job.
      - name: Run tournament predictions
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.BENCHMARK_OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.BENCHMARK_ANTHROPIC_API_KEY }}
          SERPER_API_KEY: ${{ secrets.BENCHMARK_SERPER_API_KEY }}
          SEARCH_PROVIDER: ${{ secrets.BENCHMARK_SEARCH_PROVIDER }}
          GOOGLE_API_KEY: ${{ secrets.BENCHMARK_GOOGLE_API_KEY }}
          GOOGLE_ENGINE_ID: ${{ secrets.BENCHMARK_GOOGLE_ENGINE_ID }}
          INPUT_TOOLS: ${{ github.event.inputs.tools }}
          INPUT_MAX_MARKETS: ${{ github.event.inputs.max_markets || '10' }}
        run: |
          # When INPUT_TOOLS is empty (cron run, or dispatch with the
          # default), omit --tools so tournament.py runs every tool listed
          # in tournament_tools.json — the single source of truth.
          TOOLS_FLAG=""
          if [ -n "$INPUT_TOOLS" ]; then
            TOOLS_FLAG="--tools $INPUT_TOOLS"
          fi
          uv run python -m benchmark.tournament \
            --markets benchmark/datasets/open_markets.jsonl \
            $TOOLS_FLAG \
            --max-markets "$INPUT_MAX_MARKETS"

      - name: Score resolved predictions
        run: uv run python -m benchmark.score_tournament

      - name: Upload tournament predictions
        uses: actions/upload-artifact@v4
        with:
          name: tournament-predictions
          path: |
            benchmark/results/tournament_predictions.jsonl
            benchmark/results/tournament_scored.jsonl
          retention-days: 90
