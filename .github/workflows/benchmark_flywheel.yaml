name: benchmark-flywheel

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Number of days to look back for data'
        required: false
        default: '7'
      max_markets:
        description: 'Max markets per platform for tournament'
        required: false
        default: '10'
      tools:
        description: 'Comma-separated tool names for tournament'
        required: false
        default: 'prediction-online,prediction-offline,claude-prediction-online,claude-prediction-offline,superforcaster,prediction-request-reasoning,prediction-request-reasoning-claude,prediction-request-rag,prediction-request-rag-claude,prediction-url-cot,prediction-url-cot-claude,prediction-offline-sme,prediction-online-sme'
      notify_slack:
        description: 'Post summary to Slack'
        required: false
        type: boolean
        default: true
      run_suggestions:
        description: 'Run AI tool improvement suggestions'
        required: false
        type: boolean
        default: false

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Production benchmark (existing, unchanged)
  # -----------------------------------------------------------------------
  benchmark:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      # Download previous run's data (if it exists)
      - name: Download previous benchmark data
        uses: dawidd6/action-download-artifact@v3
        with:
          name: benchmark-data
          path: benchmark/datasets/
          workflow: benchmark_flywheel.yaml
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Fetch production data
        run: |
          python benchmark/datasets/fetch_production.py \
            --lookback-days "${{ github.event.inputs.lookback_days || '7' }}"

      - name: Score
        run: |
          mkdir -p benchmark/results
          python benchmark/scorer.py

      - name: Analyze
        run: python benchmark/analyze.py

      - name: Post summary to Slack
        if: (github.event.inputs.notify_slack != 'false') && (vars.ENABLE_SLACK_NOTIFY != 'false')
        env:
          OPENAI_API_KEY: ${{ secrets.BENCHMARK_OPENAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.BENCHMARK_SLACK_WEBHOOK_URL }}
        run: python benchmark/notify_slack.py --report benchmark/results/report.md

      # Upload data files for next run (persists between runs)
      - name: Upload benchmark data
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-data
          path: |
            benchmark/datasets/production_log.jsonl
            benchmark/datasets/.fetch_state.json
          retention-days: 90

      # Upload results for viewing
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark/results/scores.json
            benchmark/results/report.md
          retention-days: 90

  # -----------------------------------------------------------------------
  # Job 2: Fetch open markets for tournament (fast, no API keys)
  # -----------------------------------------------------------------------
  tournament-fetch:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Download previous open markets
        uses: dawidd6/action-download-artifact@v3
        with:
          name: tournament-markets
          path: benchmark/datasets/
          workflow: benchmark_flywheel.yaml
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Fetch Omen open markets
        run: |
          python -m benchmark.datasets.fetch_open \
            --platform omen \
            --max-markets "${{ github.event.inputs.max_markets || '10' }}"

      - name: Fetch Polymarket open markets
        run: |
          python -m benchmark.datasets.fetch_open \
            --platform polymarket \
            --max-markets "${{ github.event.inputs.max_markets || '10' }}" \
            --min-liquidity 1000

      - name: Upload tournament markets
        uses: actions/upload-artifact@v4
        with:
          name: tournament-markets
          path: benchmark/datasets/open_markets.jsonl
          retention-days: 90

  # -----------------------------------------------------------------------
  # Job 3a: Check if benchmark API keys are configured
  # -----------------------------------------------------------------------
  check-secrets:
    runs-on: ubuntu-22.04
    outputs:
      has_keys: ${{ steps.check.outputs.has_keys }}
    steps:
      - id: check
        env:
          KEY: ${{ secrets.BENCHMARK_OPENAI_API_KEY }}
        run: echo "has_keys=${{ env.KEY != '' }}" >> $GITHUB_OUTPUT

  # -----------------------------------------------------------------------
  # Job 3b: Run tournament predictions + score (slow, needs API keys)
  # -----------------------------------------------------------------------
  tournament-run:
    needs: [tournament-fetch, check-secrets]
    if: needs.check-secrets.outputs.has_keys == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: astral-sh/setup-uv@v4

      - name: Install project dependencies
        run: uv sync

      - name: Sync autonomy packages
        run: |
          uv run autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
          uv run autonomy packages sync

      - name: Download tournament markets
        uses: actions/download-artifact@v4
        with:
          name: tournament-markets
          path: benchmark/datasets/

      - name: Download previous tournament predictions
        uses: dawidd6/action-download-artifact@v3
        with:
          name: tournament-predictions
          path: benchmark/results/
          workflow: benchmark_flywheel.yaml
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Run tournament predictions
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.BENCHMARK_OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.BENCHMARK_ANTHROPIC_API_KEY }}
          SERPER_API_KEY: ${{ secrets.BENCHMARK_SERPER_API_KEY }}
          SEARCH_PROVIDER: ${{ secrets.BENCHMARK_SEARCH_PROVIDER }}
          GOOGLE_API_KEY: ${{ secrets.BENCHMARK_GOOGLE_API_KEY }}
          GOOGLE_ENGINE_ID: ${{ secrets.BENCHMARK_GOOGLE_ENGINE_ID }}
        run: |
          uv run python -m benchmark.tournament \
            --markets benchmark/datasets/open_markets.jsonl \
            --tools "${{ github.event.inputs.tools || 'prediction-online,prediction-offline,claude-prediction-online,claude-prediction-offline,superforcaster,prediction-request-reasoning,prediction-request-reasoning-claude,prediction-request-rag,prediction-request-rag-claude,prediction-url-cot,prediction-url-cot-claude,prediction-offline-sme,prediction-online-sme' }}" \
            --max-markets "${{ github.event.inputs.max_markets || '10' }}"

      - name: Score resolved predictions
        run: uv run python -m benchmark.score_tournament

      - name: Upload tournament predictions
        uses: actions/upload-artifact@v4
        with:
          name: tournament-predictions
          path: |
            benchmark/results/tournament_predictions.jsonl
            benchmark/results/tournament_scored.jsonl
          retention-days: 90

  # -----------------------------------------------------------------------
  # Job 4: AI-powered tool improvement suggestions
  # -----------------------------------------------------------------------
  suggest-improvements:
    needs: [benchmark]
    if: (github.event.inputs.run_suggestions == 'true') || (github.event_name == 'schedule' && vars.ENABLE_TOOL_SUGGESTIONS != 'false')
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download benchmark results
        uses: dawidd6/action-download-artifact@v6
        with:
          name: benchmark-results
          path: benchmark/results/
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Download tournament predictions
        uses: dawidd6/action-download-artifact@v6
        with:
          name: tournament-predictions
          path: benchmark/results/
          if_no_artifact_found: warn
        continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install project dependencies
        run: uv sync

      - name: Sync packages
        run: |
          uv run autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
          uv run autonomy packages sync

      - name: Claude Code Analysis
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.BENCHMARK_ANTHROPIC_API_KEY }}
          prompt: |
            You are analyzing benchmark results for prediction tools and suggesting improvements.

            Phase 0 — Check for existing work:
            Run: gh pr list --label "auto-improvement" --state open --json title
            Run: gh issue list --label "auto-improvement" --state open --json title
            If there's already an open PR or issue for the same tool, stop — don't
            create duplicates.

            Phase 1 — Identify target tool:
            Read benchmark/results/scores.json. Look at the "by_tool" section. Find the tool
            with the worst (highest) Brier score that has >= 50 valid predictions (valid_n)
            and > 80% reliability. This is the tool to improve.
            If no tool has Brier > 0.27, stop — all tools are performing above baseline.

            Phase 2 — Diagnose:
            Read the tool's source code. Use the TOOL_REGISTRY mapping in benchmark/runner.py
            to find the module path (e.g., prediction-online maps to
            packages.valory.customs.prediction_request.prediction_request). Compare its prompt
            template to better-performing tools. Identify concrete issues:
            - Weak/missing reasoning scaffolding
            - No bias correction
            - Missing chain-of-thought
            - Poor output format instructions

            Phase 3 — Fix:
            Modify the tool's prompt template. DO NOT change the function signature, return
            format, or package structure. Only modify prompt strings and parameters
            (temperature, max_tokens, etc.).

            Phase 4 — Validate with cached replay:
            Check if benchmark/results/tournament_predictions.jsonl exists with rows that
            have final_outcome set and source_content present for the target tool.

            Baseline: score the EXISTING predictions for this tool from
            tournament_predictions.jsonl — these were made with the original prompt.
              python benchmark/scorer.py --input <extracted_baseline_rows> --output benchmark/results/baseline_scores.json

            Improved: run the MODIFIED prompt on the same markets using cached replay:
              python benchmark/runner.py --dataset <same_markets> --tools <tool_name>
              python benchmark/scorer.py --input benchmark/results/replay_results.jsonl --output benchmark/results/improved_scores.json

            Compare the two Brier scores on the SAME set of markets. Do NOT compare
            against the global baseline in scores.json — only the matched markets matter.
            If no replay data is available, skip validation and note this in the PR.

            Phase 5 — Lint:
            Run `tomte check-code` and fix any issues before committing.

            Phase 6 — Output:
            If the replay shows improvement (lower Brier) OR you made changes you're
            confident about but couldn't validate (no replay data):
              - Commit only the changed tool file(s). Add [skip ci] to the commit message.
              - Open a PR to the main branch with label "auto-improvement".
              - PR title: "improve: <tool-name> prompt (Brier X.XX → Y.YY)"
              - PR body: baseline score, new score (or "not validated"), what changed,
                and whether cached replay or tournament validation is needed.

            If you diagnosed issues but couldn't come up with a concrete fix, OR the
            replay shows no improvement:
              - Open a GitHub issue with label "auto-improvement".
              - Issue title: "tool-improvement: <tool-name> (Brier X.XX)"
              - Issue body: diagnosis, what you tried (if anything), why it didn't work,
                and suggested approaches for a human to investigate.
          claude_args: |
            --max-turns 25
            --allowedTools Read,Edit,Write,Glob,Grep,Bash(python:*),Bash(pip:*),Bash(git:*),Bash(gh:*),Bash(uv:*),Bash(tomte:*)
