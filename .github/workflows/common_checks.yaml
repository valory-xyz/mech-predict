name: main_workflow

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lock_check:
    continue-on-error: False
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python-version: ["3.10"]

    defaults:
      run:
        shell: bash

    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Check if dependencies can be locked
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --all-groups -v

  copyright_and_dependencies_check:
    continue-on-error: False
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.10"]

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@v0.7.0' tox-uv
      - name: Check copyright headers
        run: tomte check-copyright --author valory
      - name: License compatibility check
        run: tomte tox -e liccheck
      - name: Check dependencies
        run: tomte tox -e check-dependencies
      - name: Check third-party package hashes match upstream
        run: tomte tox -e check-third-party-hashes
      - name: Check doc IPFS hashes
        run: tomte tox -e check-doc-hashes

  linter_checks:
    continue-on-error: False
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.10"]

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@v0.7.0' tox-uv
      - name: Security checks
        run: tomte tox -p -e safety -e bandit
      - name: Check packages
        run: tomte tox -e check-packages
      - name: Check hash
        run: tomte tox -e check-hash
      - name: Code checks
        run: tomte tox -p -e black-check -e isort-check -e flake8 -e mypy -e pylint -e darglint
      - name: AbciApp consistency checks
        run: |
          tomte tox -e check-abci-docstrings
          tomte tox -e check-abciapp-specs
          tomte tox -e check-handlers

  scan:
    name: gitleaks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - run: |
          wget https://github.com/zricethezav/gitleaks/releases/download/v8.10.1/gitleaks_8.10.1_linux_x64.tar.gz
          tar -xzf gitleaks_8.10.1_linux_x64.tar.gz
          sudo install gitleaks /usr/bin
          pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@v0.7.0' tox-uv
          tomte tox -e gitleaks

  test:
    continue-on-error: False
    needs:
      - lock_check
      - copyright_and_dependencies_check
      - linter_checks
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - if: matrix.os == 'ubuntu-24.04'
        name: Install dependencies (ubuntu-24.04)
        run: |
          sudo apt-get update --fix-missing
          sudo apt-get autoremove
          sudo apt-get autoclean
          pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@v0.7.0' tox-uv
          pip install --user --upgrade setuptools

      - if: matrix.os == 'ubuntu-24.04'
        name: Packages unit tests ubuntu-24.04
        run: |
          tomte tox -e py${{ matrix.python-version }}-linux

      - if: matrix.os == 'macos-15'
        name: Install dependencies (macos-15)
        run: |
          pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@v0.7.0' tox-uv
          pip install --user --upgrade setuptools

      - if: matrix.os == 'macos-15'
        name: Packages unit tests macos-15
        run: |
          tomte tox -e py${{ matrix.python-version }}-darwin

      - if: matrix.os == 'windows-2025'
        name: Install dependencies (windows-2025)
        run: |
          python -m pip install -U pip
          pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@v0.7.0' tox-uv
          pip install --upgrade setuptools

      - if: matrix.os == 'windows-2025'
        name: Packages unit tests windows-2025
        run: |
          tomte tox -e py${{ matrix.python-version }}-win

      - if: matrix.os == 'ubuntu-24.04'
        name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  detect_changes:
    # Decide whether the live-tool integration suite needs to run. It is the
    # ONLY gated job: it spins up isolated venvs and calls real third-party
    # APIs (cost + secrets + ~2h budget). We run it by DEFAULT and skip it only
    # when EVERY changed file lives under benchmark/ — that code is self-contained
    # offline analysis that never touches the live tools, so it can't affect the
    # integration results. Every other job — including the unit-test matrix above
    # — stays ungated and runs on every push/PR.
    name: Detect tool changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      run_integration: ${{ steps.filter.outputs.run_integration }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine whether to run the integration suite
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi
          # New branch or unknown base (all-zero SHA): can't diff, so run the
          # suite to stay on the safe side.
          if [ -z "${base_sha}" ] || [ "${base_sha}" = "0000000000000000000000000000000000000000" ]; then
            echo "No usable base SHA; running integration tests."
            echo "run_integration=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # --no-renames: keep rename detection OFF so a move is recorded as
          # delete(old)+add(new). Otherwise git collapses a rename to its
          # destination only, and moving a tool INTO benchmark/ would look
          # benchmark-only and wrongly skip the live suite.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed="$(git diff --name-only --no-renames "${base_sha}...${head_sha}")"
          else
            changed="$(git diff --name-only --no-renames "${base_sha}" "${head_sha}")"
          fi
          echo "Changed files:"
          echo "${changed:-<none>}"
          # Skip the live suite ONLY when every changed file is under benchmark/.
          # List the changed files NOT under benchmark/ (|| true so a
          # benchmark-only diff — where grep matches nothing and exits 1 —
          # doesn't trip set -e/pipefail). If that list is non-empty, something
          # outside benchmark/ changed, so run. Branching on grep's output, not
          # its exit code, keeps this correct across grep implementations.
          non_benchmark="$(echo "${changed}" | grep -vE '^benchmark/' || true)"
          if [ -z "${changed}" ]; then
            echo "Empty diff -> running integration tests to be safe."
            echo "run_integration=true" >> "$GITHUB_OUTPUT"
          elif [ -n "${non_benchmark}" ]; then
            echo "Change outside benchmark/ detected -> running integration tests."
            echo "run_integration=true" >> "$GITHUB_OUTPUT"
          else
            echo "Benchmark-only change -> skipping integration tests."
            echo "run_integration=false" >> "$GITHUB_OUTPUT"
          fi

  integration_tests:
    continue-on-error: False
    needs:
      - test
      - detect_changes
    # Skipped (not failed) for benchmark-only changes, so the all_checks_passed
    # aggregate below still goes green.
    if: needs.detect_changes.outputs.run_integration == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      OPENAI_SECRET_KEY: ${{ secrets.OPENAI_SECRET_KEY }}
      OPENAI_SECRET_KEYS: ${{ secrets.OPENAI_SECRET_KEYS }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GOOGLE_API_KEYS: ${{ secrets.GOOGLE_API_KEYS }}
      GOOGLE_ENGINE_ID: ${{ secrets.GOOGLE_ENGINE_ID }}
      GOOGLE_ENGINE_IDS: ${{ secrets.GOOGLE_ENGINE_IDS }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      CLAUDE_API_KEYS: ${{ secrets.CLAUDE_API_KEYS }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      NEWS_API_KEYS: ${{ secrets.NEWS_API_KEYS }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_API_KEYS: ${{ secrets.OPENROUTER_API_KEYS }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update --fix-missing
          sudo apt-get autoremove
          sudo apt-get autoclean
          pip install 'tomte[tox,cli] @ git+https://github.com/valory-xyz/tomte.git@v0.7.0' tox-uv
          pip install --user --upgrade setuptools
      - name: Live-tool integration tests
        run: tomte tox -e integration-tests

  all_checks_passed:
    name: All checks passed
    if: always()
    needs:
      - lock_check
      - copyright_and_dependencies_check
      - linter_checks
      - scan
      - test
      - detect_changes
      - integration_tests
    runs-on: ubuntu-24.04
    steps:
      - name: Fail if any required job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
      - run: echo "All required checks passed."
