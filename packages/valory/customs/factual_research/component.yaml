name: factual_research
author: valory
version: 0.1.0
type: custom
description: 'A tool for making binary predictions on markets. Returns the standard
  mech prediction output (p_yes, p_no, confidence, info_utility). Its edge comes from
  grounding the estimate in cited, verifiable facts: the tool reframes the market
  question into narrow factual sub-questions, gathers web evidence with citations,
  synthesises a factual briefing, and only then converts the briefing into the prediction
  output.'
license: Apache-2.0
aea_version: '>=1.0.0, <2.0.0'
fingerprint:
  __init__.py: bafybeibrhuo2o5tu43vxc7a7uvniee52emt2erbmc32r4krcftc2gm3h2q
  factual_research.py: bafybeigpfpmcdomqkjoqa23fh644lm2jkqze6ycln5ilyygyfujkzhfroy
  tests/__init__.py: bafybeibu5izhcixkot5uv2k6uwj736qcpvdbepyk2ardyrhhc6vmhvgwnu
  tests/test_factual_research.py: bafybeide7s3ue7uox4pipknh4v7xxacw32m7sswymxjxa4vodl75f56plm
fingerprint_ignore_patterns: []
entry_point: factual_research.py
callable: run
params:
  default_model: gpt-4.1-2025-04-14
dependencies:
  openai:
    version: ==1.93.0
  tiktoken:
    version: ==0.12.0
  pydantic:
    version: '>=2.0.0,<3.0.0'
  requests:
    version: ==2.32.5
  readability-lxml:
    version: ==0.8.1
  lxml_html_clean:
    version: ==0.4.4
  markdownify:
    version: ==1.2.2
