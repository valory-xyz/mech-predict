name: factual_research_v2
author: valory
version: 0.1.0
type: custom
description: A tool for making binary predictions on markets. Returns the standard
  mech prediction output (p_yes, p_no, confidence, info_utility). Variant of factual_research-v1
  that, for Polymarket markets, reads the resolution rules the trader forwards in
  the request context (request_context.description) and injects them into the reframe
  and estimate stages, so sub-questions and the probability target the exact resolution
  criteria. Only the resolution rules are used - no price/odds/volume is ever forwarded
  - the tool never contacts Polymarket itself, and it falls back to v1 behaviour when
  no resolution rules are present.
license: Apache-2.0
aea_version: '>=1.0.0, <2.0.0'
fingerprint:
  __init__.py: bafybeibrhuo2o5tu43vxc7a7uvniee52emt2erbmc32r4krcftc2gm3h2q
  factual_research_v2.py: bafybeiam63jkt7r6en33q6whib5dj4qth7xyengmkgxsbt4p737m7xo72e
  tests/__init__.py: bafybeibu5izhcixkot5uv2k6uwj736qcpvdbepyk2ardyrhhc6vmhvgwnu
  tests/test_factual_research.py: bafybeibqb67w3aprzqoniuwndeidnjr67eowhn3wyc2mqt6njxds2hib2a
fingerprint_ignore_patterns: []
