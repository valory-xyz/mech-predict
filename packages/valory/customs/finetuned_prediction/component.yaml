name: finetuned_prediction
author: valory
version: 0.1.0
type: custom
description: Serves the base or the fine-tuned 14B Qwen models via vLLM.
license: Apache-2.0
aea_version: '>=1.0.0, <2.0.0'
fingerprint: {}
fingerprint_ignore_patterns: []
entry_point: finetuned_prediction.py
callable: run
params:
  # default_model below is unused: the tool routes by tool name, not by the framework's `model` kwarg.
  # Kept as the conventional params slot (the framework reads it with a None default, so its value does not matter).
  default_model: ''
dependencies:
  openai:
    version: ==1.30.2
  httpx:
    version: ==0.25.2
  requests:
    version: ==2.32.5
