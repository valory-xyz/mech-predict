name: superforcaster
author: valory
version: 0.1.0
type: custom
description: A tool for making binary predictions on markets using the Serper API
  and LLMs. Beyond Serper snippets, the tool fetches the top organic results, extracts
  the main article text via readability + markdownify, and feeds the cleaned page
  content into the forecasting prompt for richer evidence.
license: Apache-2.0
aea_version: '>=1.0.0, <2.0.0'
