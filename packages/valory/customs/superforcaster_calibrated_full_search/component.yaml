name: superforcaster_calibrated_full_search
author: valory
version: 0.1.0
type: custom
description: Sibling of the calibration-ON superforcaster build live on Omen production
  (Structured Outputs, max_tokens=4096, CALIBRATION block + EVIDENCE BAR / CONFIDENCE
  COUPLING / NUMERIC QUESTIONS checks). Adds an evidence layer that fetches the top
  organic results, extracts the main article text via readability + markdownify, and
  feeds the cleaned page body into the forecasting prompt alongside the Serper snippet.
  The prediction prompt and architecture are otherwise unchanged from that calibration-ON
  build.
license: Apache-2.0
