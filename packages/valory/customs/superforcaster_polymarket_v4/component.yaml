name: superforcaster_polymarket_v4
author: valory
version: 0.1.0
type: custom
description: A tool for making binary predictions on markets using the Serper API
  and LLMs. v4 adds a mandatory evidence-reliability screen in step 4 that discards
  prediction-market-odds (circular self-referential) and applies a forward-looking
  intent discount, plus raises max_tokens to 1500 to allow the full chain-of-thought
  to execute.
license: Apache-2.0
aea_version: '>=1.0.0, <2.0.0'
