name: superforcaster_polymarket_v4
author: valory
version: 0.1.0
type: custom
description: A tool for making binary predictions on markets using the Serper API
  and LLMs. v4 adds a step-4 evidence-reliability screen (prediction-market- odds
  filter, forward-looking-intent discount, TYPE A/B temporal-evidence classification,
  criterion-specificity check) for systematic overconfident-YES on Polymarket; consolidates
  the abandoned v4/v5 work (#375) into one tool off v1.
license: Apache-2.0
