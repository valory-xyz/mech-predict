name: superforcaster_polymarket_v5
author: valory
version: 0.1.0
type: custom
description: A tool for making binary predictions on markets. v5 adds a step-4 evidence-reliability
  screen (prediction-market-odds filter, forward-looking-intent discount, TYPE A/B
  temporal-evidence classification, criterion-specificity check) for systematic overconfident-YES
  on Polymarket; raises max_tokens 500->1500 so the full chain-of-thought executes
  before the JSON is emitted.
