; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
; Most runtime deps auto-mirror from [project].dependencies. Listed here
; are range-form overrides for runtime deps where the package YAML uses
; a range expression — `aea-helpers check-dependencies` does
; string-strict matching so the form must agree on both sides. Plus
; lint-only werkzeug/attrs not in pyproject.
extra_deps =
    peewee<4,>=3.17
    eth-utils==6.0.0
    protobuf<7,>=5
    web3<8,>=7.0.0
    fastapi==0.110.3
    langchain-text-splitters==1.0.0
    langgraph-prebuilt==1.0.8
    pandas==2.3.3
    werkzeug==3.1.6
    attrs==25.4.0
    prometheus_client>=0.23.1,<0.24
    openapi-spec-validator<0.8.0,>=0.7.0
    typing_extensions<=4.15.0,>=3.10.0.2
    pydantic<3.0.0,>=2.0.0
    lxml_html_clean
    typer
    gql>=3.5.0,<3.6
    requests-toolbelt==1.0.0

extra_pylint_ignored_modules = pandas,numpy,aea_cli_ipfs,compose,multidict,gql

; Mech tool packages mirror upstream API surfaces (OpenAI/Anthropic-style
; client wrappers, top-level `run()` entry points with key-rotation
; fallback handlers). The patterns below are pervasive and intentional
; across `packages/*/customs/*`:
; - W0718 broad-exception-caught: tool entry points must surface ANY
;   error as part of the (result, ...) return tuple instead of crashing
;   the agent loop; a bare `except Exception` is the correct shape.
; - W0613 unused-argument: tools accept compatibility kwargs (timeout,
;   top_p, n, stop, ...) to match upstream client signatures even when
;   a given backend ignores them.
; - W0102 dangerous-default-value: mutable defaults (`messages: List = []`)
;   mirror the OpenAI/Anthropic SDK signatures the wrappers shadow.
extra_pylint_disables = W0718,W0613,W0102

[pytest]
; Opt in to tomte's canonical pytest defaults (integration/e2e markers,
; aea.* DeprecationWarning filter). Plugin is silent without this flag so
; non-fleet `tomte[black]` consumers don't get unexpected config injection.
tomte_defaults = true
; mech-predict has multiple `customs/` namespaces (valory/, napthaai/,
; nickcom007/, victorpolisetty/) that share child names; pytest's default
; prepend importer collapses them into a single `customs` package and
; raises `ModuleNotFoundError` when collecting tests from more than one.
; importlib mode imports each test by file path without sys.path tricks.
; `-p no:pytest_anchorpy` disables anchorpy 0.20.2's pytest11 entry point —
; transitive via open-aea-ledger-solana since open-autonomy 0.21.20 — whose
; plugin imports a stale `pytest_xprocess.getrootdir` and crashes pytest
; collection.
addopts = --import-mode=importlib -p no:pytest_anchorpy
; importlib mode does NOT prepend the rootdir to sys.path, so synced
; third-party packages (e.g. `packages.valory.skills.task_execution`,
; populated by `autonomy packages sync` after the wheel was built) become
; unimportable. Re-add the rootdir explicitly so they resolve on every
; matrix entry — the canonical {env:PWD:%CD%} fallback doesn't substitute
; on Windows runners.
pythonpath = .

[mypy]
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore

; Repo-specific overrides (third-party packages synced via IPFS, not
; lint-clean — these come from mech upstream).
[mypy-packages.valory.connections.*]
ignore_errors = True

[mypy-packages.valory.contracts.*]
ignore_errors = True
ignore_missing_imports = True

[mypy-packages.valory.protocols.*]
ignore_errors = True

[mypy-packages.valory.skills.*]
ignore_errors = True

; Repo-specific libs without type stubs not covered by canonical mypy.ini.
[mypy-googlesearch.*]
ignore_missing_imports = True

[mypy-googleapiclient.*]
ignore_missing_imports = True

[mypy-langchain.*]
ignore_missing_imports = True

[mypy-langchain_core.*]
ignore_missing_imports = True

[mypy-langchain_tavily.*]
ignore_missing_imports = True

[mypy-langgraph.*]
ignore_missing_imports = True

[mypy-langgraph_prebuilt.*]
ignore_missing_imports = True

[mypy-tavily.*]
ignore_missing_imports = True

[mypy-readability.*]
ignore_missing_imports = True

[mypy-faiss.*]
ignore_missing_imports = True

[mypy-replicate.*]
ignore_missing_imports = True

[mypy-bs4.*]
ignore_missing_imports = True

[mypy-pypdf.*]
ignore_missing_imports = True

[mypy-moviepy.*]
ignore_missing_imports = True

[mypy-markdownify.*]
ignore_missing_imports = True

[mypy-docstring_parser.*]
ignore_missing_imports = True

[mypy-tqdm.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-google.*]
ignore_missing_imports = True

; Canonical config has `[mypy-requests]`, but tools import the
; submodule (`requests.exceptions`); the wildcard form is needed.
[mypy-requests.*]
ignore_missing_imports = True

[mypy-gql.*]
ignore_missing_imports = True


[Authorized Packages]
; open-autonomy wheel metadata reports "Other/Proprietary"; actual license is Apache-2.0.
open-autonomy: ==0.21.26
; anchorpy / based58 / jsonalias: transitive deps via open-aea-ledger-solana
; (added by open-autonomy 0.21.20). All three ship under MIT per their
; GitHub repos but expose no PyPI License field, so PARANOID liccheck
; reports them UNKNOWN.
anchorpy: 0.20.2
based58: 0.1.1
jsonalias: 0.1.1
; numpy compound license (BSD-3 + 0BSD + MIT + Zlib + CC0); permissive.
numpy: *
; Permissive licenses (0BSD, MIT-0, MIT-CMU, ISCL, MIT AND BSD-3-Clause,
; MIT AND PSF-2.0) that the canonical [Licenses] block doesn't list
; verbatim. All compatible with Apache-2.0 distribution.
; cffi >=2.0 exposes its license as MIT-0 (MIT No Attribution), a
; transitive dep pulled via cryptography << open-aea-ledger-solana / google-*.
cffi: *
chardet: *
faiss-cpu: *
greenlet: *
pillow: *
shellingham: *
; MIT-0
cffi: *
; replicate ships without license classifier metadata in 0.15.7; pinned
; via pyproject because newer 0.15.8 also lacks it. License is Apache-2.0.
replicate: *


; Live-tool suite under `tests/test_tools.py` spins up isolated venvs and
; calls real Gemini / Stability / Replicate / OpenAI / Claude APIs; it
; needs the secret fan-out from the workflow's integration_tests job and
; should not run inside the unit-test matrix. Declare a dedicated env so
; the integration_tests job can opt in via `tomte tox -e integration-tests`
; while the canonical py3.X-{linux,darwin,win} unit envs stay scoped to
; auto-discovered customs tests + benchmark/tests via `pytest_targets_extra`.
[testenv:integration-tests]
deps = {[deps-packages]deps}
passenv = *
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync
    pytest tests {posargs}
